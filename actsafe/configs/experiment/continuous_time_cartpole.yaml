# @package _global_
defaults:
  - override /environment: dm_cartpole
  - override /agent: actsafe

training:
  action_repeat: 1  # Base simulation resolution
  epochs: 300
  safe: true
  safety_budget: 100
  
agent:
  exploration_strategy: opax
  exploration_steps: 1000000
  actor:
    init_stddev: 0.025
  sentiment:
    constraint_pessimism: 50.0
  continuous_time:
    enabled: true
    min_time_factor: 1
    max_time_factor: 50
    switch_cost: 0.01
    # base_dt is dynamically inferred at runtime from the env
    
environment:
  dm_cartpole:
    task: safe_swingup_sparse_hard
